      discovery_rules:
        - uuid: 5c47b5df5dcf4b4d91b6c7a2c8993001
          name: Wazuh cluster node discovery
          type: DEPENDENT
          key: wazuh.cluster.nodes.discovery
          delay: '0'
          lifetime: 7d
          item_prototypes:
            - uuid: 0a8dc24f460a41799cfb14f85c383001
              name: 'Wazuh node [{#NODE.NAME}] active agents'
              type: DEPENDENT
              key: 'wazuh.node.active_agents[{#NODE.NAME}]'
              delay: '0'
              value_type: UNSIGNED
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var rows = JSON.parse(value).cluster_nodes || [];
                      for (var i = 0; i < rows.length; i++) {
                        if (rows[i].name === '{#NODE.NAME}') {
                          return rows[i].n_active_agents;
