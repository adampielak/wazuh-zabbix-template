zabbix_export:
  version: '7.0'
  template_groups:
    - uuid: d1c8a9499b94461c8b6418b6544e1001
      name: Templates/Security
  templates:
    - uuid: 9d6fa12f5ea74f6dbf4ad2d40c0a3001
      template: Template Wazuh API by Script
      name: Template Wazuh API by Script
      description: |
        Wazuh monitoring template for Zabbix 7.0.
        tick@linuxmafia.pl (Adam Pielak) 2026 Cyberbunker.pl (License GPLv2)
        Covers cluster status, node healthcheck, manager daemons, agent summary and remoted queue usage.
      groups:
        - name: Templates/Security
      macros:
        - macro: '{$WAZUH.URL}'
          value: 'https://127.0.0.1:55000'
          description: 'Base URL for Wazuh API'
        - macro: '{$WAZUH.USER}'
          value: wazuh
          description: 'Wazuh API username'
        - macro: '{$WAZUH.PASSWORD}'
          value: wazuh
          description: 'Wazuh API password'
        - macro: '{$WAZUH.TIMEOUT}'
          value: 10s
          description: 'HTTP timeout per request'
        - macro: '{$WAZUH.API_TOKEN}'
          value: ''
          description: 'Optional static token; when set, login step is skipped'
      items:
        - uuid: 11b16f5b7d8444ce9dc1040b0f2a3001
          name: Wazuh API diagnostic
          type: SCRIPT
          key: wazuh.api.diagnostic
          delay: 1m
          history: 7d
          value_type: TEXT
          trends: '0'
          timeout: '{$WAZUH.TIMEOUT}'
          params: |
            var baseUrl = '{$WAZUH.URL}'.replace(/\/$/, '');
            var username = '{$WAZUH.USER}';
            var password = '{$WAZUH.PASSWORD}';
            var staticToken = '{$WAZUH.API_TOKEN}';

            function doRequest(method, path, token, useBasic) {
              var req = new HttpRequest();
              req.addHeader('Content-Type: application/json');
              req.addHeader('Accept: application/json');

              if (token) {
                req.addHeader('Authorization: Bearer ' + token);
              } else if (useBasic) {
                req.setHttpAuth(HTTPAUTH_BASIC, username, password);
              }

              var raw = '';
              var status = 0;

              try {
                if (method === 'POST') {
                  raw = req.post(baseUrl + path, '');
                } else {
                  raw = req.get(baseUrl + path);
                }
                status = req.getStatus();
                return { ok: status >= 200 && status < 300, status: status, body: raw, error: '' };
              } catch (e) {
                return { ok: false, status: status, body: raw, error: String(e) };
              }
            }

            function parseToken(raw) {
              try {
                var obj = JSON.parse(raw);
                if (obj && obj.data && obj.data.token) {
                  return obj.data.token;
                }
              } catch (e) {
              }
              if (typeof raw === 'string' && raw.length > 20) {
                return raw;
              }
              return '';
            }

            var token = staticToken && staticToken !== '' ? staticToken : '';
            var authPost = null;
            var authGet = null;

            if (!token) {
              authPost = doRequest('POST', '/security/user/authenticate?raw=true', null, true);
              if (authPost.ok) {
                token = parseToken(authPost.body);
              }

              if (!token) {
                authGet = doRequest('GET', '/security/user/authenticate?raw=true', null, true);
                if (authGet.ok) {
                  token = parseToken(authGet.body);
                }
              }
            }

            var ping = doRequest('GET', '/', token || null, false);

            var stage = 'ok';
            if (!token) {
              stage = 'auth';
            }
            if (token && !ping.ok) {
              stage = (ping.error && ping.error.indexOf("Couldn't connect to server") !== -1) ? 'connect' : 'api';
            }

            var message = '';
            if (stage === 'ok') {
              message = 'OK';
            } else if (stage === 'connect') {
              message = 'CONNECT_ERROR';
            } else if (stage === 'auth') {
              message = 'AUTH_ERROR';
            } else {
              message = 'API_ERROR';
            }

            return JSON.stringify({
              stage: stage,
              message: message,
              token_mode: token ? (staticToken ? 'static' : 'dynamic') : 'none',
              auth_post_status: authPost ? authPost.status : null,
              auth_get_status: authGet ? authGet.status : null,
              ping_status: ping.status,
              ping_error: ping.error,
              ts: Math.floor(Date.now() / 1000)
            });
        - uuid: 4a25184f3db3419f9b171d4124683001
          name: Wazuh API health
          type: DEPENDENT
          key: wazuh.api.health
          delay: '0'
          value_type: UNSIGNED
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.stage
            - type: JAVASCRIPT
              parameters:
                - 'return value === "ok" ? 1 : 0;'
          master_item:
            key: wazuh.api.diagnostic
          triggers:
            - uuid: 0c486eb312ea4b559675f95f18af3001
              expression: 'last(/Template Wazuh API by Script/wazuh.api.health)=0'
              name: 'Wazuh API diagnostic failed (health={ITEM.LASTVALUE1})'
              priority: HIGH
              manual_close: 'YES'
        - uuid: 8e0a5d5eab1e4fd1889868f137f13001
          name: Wazuh snapshot raw
          type: SCRIPT
          key: wazuh.snapshot.raw
          delay: 1m
          history: 1d
          value_type: TEXT
          trends: '0'
          timeout: '{$WAZUH.TIMEOUT}'
          params: |
            var baseUrl = '{$WAZUH.URL}'.replace(/\/$/, '');
            var username = '{$WAZUH.USER}';
            var password = '{$WAZUH.PASSWORD}';
            var staticToken = '{$WAZUH.API_TOKEN}';

            function request(method, path, body, token) {
              var req = new HttpRequest();
              req.addHeader('Content-Type: application/json');
              req.addHeader('Accept: application/json');

              if (token) {
                req.addHeader('Authorization: Bearer ' + token);
              } else {
                req.setHttpAuth(HTTPAUTH_BASIC, username, password);
              }

              var url = baseUrl + path;
              var raw = '';
              if (method === 'GET') {
                raw = req.get(url);
              } else if (method === 'POST') {
                raw = req.post(url, body || '');
              } else {
                throw 'Unsupported method: ' + method;
              }

              var status = req.getStatus();
              if (status < 200 || status >= 300) {
                throw 'HTTP ' + status + ' for ' + method + ' ' + path + ': ' + raw;
              }

              return raw;
            }

            function toObject(raw) {
              try {
                return JSON.parse(raw);
              } catch (e) {
                return raw;
              }
            }

            function mapStatus(value) {
              if (value === 'yes' || value === 'running' || value === true) {
                return 1;
              }
              return 0;
            }

            var token = '';

            if (staticToken && staticToken !== '') {
              token = staticToken;
            } else {
              var authRaw = '';
              var auth = null;

              try {
                authRaw = request('POST', '/security/user/authenticate?raw=true', '');
                auth = toObject(authRaw);
              } catch (postErr) {
                authRaw = request('GET', '/security/user/authenticate?raw=true', null);
                auth = toObject(authRaw);
              }

              if (typeof auth === 'string') {
                token = auth;
              } else if (auth && auth.data && auth.data.token) {
                token = auth.data.token;
              }
            }

            if (!token) {
              throw 'Unable to retrieve Wazuh API token';
            }

            var clusterStatus = toObject(request('GET', '/cluster/status', null, token));
            var health = toObject(request('GET', '/cluster/healthcheck', null, token));
            var agentsSummary = toObject(request('GET', '/agents/summary/status', null, token));
            var managerStatus = toObject(request('GET', '/manager/status', null, token));
            var managerDaemonStats = toObject(request('GET', '/manager/daemons/stats?daemons_list=wazuh-remoted,wazuh-analysisd', null, token));

            var result = {
              ts: Math.floor(Date.now() / 1000),
              cluster: {
                enabled: mapStatus(clusterStatus.data.enabled),
                running: mapStatus(clusterStatus.data.running)
              },
              agents: {
                total: agentsSummary.data.connection.total,
                active: agentsSummary.data.connection.active,
                disconnected: agentsSummary.data.connection.disconnected,
                never_connected: agentsSummary.data.connection.never_connected,
                pending: agentsSummary.data.connection.pending,
                cfg_synced: agentsSummary.data.configuration.synced,
                cfg_not_synced: agentsSummary.data.configuration.not_synced
              },
              manager: {
                daemons: managerStatus.data.affected_items[0]
              },
              remoted: {
                queue_usage_pct: null,
                queue_size: null,
                tcp_sessions: null
              },
              analysisd: {
                events_received: null,
                events_processed: null,
                events_dropped: null,
                events_edps: null,
                rule_matching_queue_usage: null,
                decoding_queue_usage: null
              },
              cluster_nodes: []
            };

            if (health && health.data && health.data.affected_items) {
              for (var i = 0; i < health.data.affected_items.length; i++) {
                var node = health.data.affected_items[i];
                var st = node.status || {};
                var totalFiles = (((st.last_sync_integrity || {}).total_files) || {});

                result.cluster_nodes.push({
                  name: node.info ? node.info.name : 'unknown',
                  type: node.info ? node.info.type : 'unknown',
                  n_active_agents: node.info ? node.info.n_active_agents : 0,
                  sync_integrity_free: st.sync_integrity_free ? 1 : 0,
                  sync_agent_info_free: st.sync_agent_info_free ? 1 : 0,
                  missing_files: totalFiles.missing || 0,
                  extra_files: totalFiles.extra || 0,
                  last_keep_alive: st.last_keep_alive || ''
                });
              }
            }

            if (managerDaemonStats && managerDaemonStats.data && managerDaemonStats.data.affected_items) {
              for (var j = 0; j < managerDaemonStats.data.affected_items.length; j++) {
                var daemon = managerDaemonStats.data.affected_items[j];
                if (daemon.name === 'wazuh-remoted' && daemon.metrics) {
                  result.remoted.queue_usage_pct = (daemon.metrics.queues && daemon.metrics.queues.received)
                    ? daemon.metrics.queues.received.usage
                    : null;
                  result.remoted.queue_size = (daemon.metrics.queues && daemon.metrics.queues.received)
                    ? daemon.metrics.queues.received.size
                    : null;
                  result.remoted.tcp_sessions = daemon.metrics.tcp_sessions;
                }

                if (daemon.name === 'wazuh-analysisd' && daemon.metrics) {
                  var dm = daemon.metrics;
                  var ev = dm.events || {};
                  var q = dm.queues || {};

                  result.analysisd.events_received =
                    (ev.received !== undefined && ev.received !== null) ? ev.received : null;
                  result.analysisd.events_processed =
                    (ev.processed !== undefined && ev.processed !== null) ? ev.processed : null;
                  result.analysisd.events_dropped =
                    (ev.dropped !== undefined && ev.dropped !== null) ? ev.dropped : null;
                  result.analysisd.events_edps =
                    (ev.edps !== undefined && ev.edps !== null) ? ev.edps : null;

                  result.analysisd.rule_matching_queue_usage =
                    (q.rule_matching && q.rule_matching.usage !== undefined) ? q.rule_matching.usage : null;
                  result.analysisd.decoding_queue_usage =
                    (q.decoding && q.decoding.usage !== undefined) ? q.decoding.usage : null;
                }
              }
            }

            return JSON.stringify(result);
        - uuid: 652a9203541f4fcbaa03f8f11a0f3001
